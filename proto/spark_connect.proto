syntax = "proto3";

package spark.connect;

service SparkConnectService {
  rpc ExecutePlan(ExecutePlanRequest) returns (stream ExecutePlanResponse);
  rpc AnalyzePlan(AnalyzePlanRequest) returns (AnalyzePlanResponse);
  rpc Config(ConfigRequest) returns (ConfigResponse);
  rpc AddArtifacts(stream AddArtifactsRequest) returns (AddArtifactsResponse);
  rpc ArtifactStatus(ArtifactStatusesRequest) returns (ArtifactStatusesResponse);
  rpc Interrupt(InterruptRequest) returns (InterruptResponse);
  rpc ReattachExecute(ReattachExecuteRequest) returns (stream ExecutePlanResponse);
  rpc ReleaseExecute(ReleaseExecuteRequest) returns (ReleaseExecuteResponse);
}

message ExecutePlanRequest {
  string session_id = 1;
  Plan plan = 3;
  string operation_id = 6;

  oneof command {
    SqlCommand sql_command = 20;
    ProjectionCommand projection_command = 21;
    RangeRepartitionCountCommand range_repartition_count_command = 22;
  }
}

message Plan {
  bytes root = 1;
  bytes command = 2;
}

message SqlCommand {
  string query = 1;
  map<string, string> table_paths = 2;
  uint32 partitions = 3;
}

message ProjectionCommand {
  repeated int64 values = 1;
  int64 add_scalar = 2;
}

message RangeRepartitionCountCommand {
  int64 start = 1;
  int64 end = 2;
  int64 step = 3;
  uint32 partitions = 4;
  uint32 repartition = 5;
}

message ExecutePlanResponse {
  string session_id = 1;
  string server_side_session_id = 15;
  string operation_id = 12;
  string response_id = 13;
  ArrowBatch arrow_batch = 2;
  ExecuteMetrics metrics = 4;
  Error error = 999;
  Schema schema = 7;
  JsonRows rows = 24;
  ResultComplete result_complete = 14;
}

message ArrowBatch {
  int64 row_count = 1;
  bytes data = 2;
  int64 start_offset = 3;
  int32 chunk_index = 4;
  int32 num_chunks_in_batch = 5;
}

message ResultComplete {}

message AnalyzePlanRequest {
  string session_id = 1;
  ExecutePlanRequest plan = 4;
}

message AnalyzePlanResponse {
  string session_id = 1;
  oneof result {
    Schema schema = 2;
    Error error = 3;
  }
}

message ConfigRequest { string session_id = 1; }

message ConfigResponse {
  string session_id = 1;
  repeated KeyValue pairs = 2;
  repeated string warnings = 3;
}

message KeyValue { string key = 1; string value = 2; }

message InterruptRequest { string session_id = 1; string operation_id = 6; }

message InterruptResponse { string session_id = 1; repeated string interrupted_ids = 2; }

message ReattachExecuteRequest { string session_id = 1; string operation_id = 3; string last_response_id = 5; }

message ReleaseExecuteRequest { string session_id = 1; string operation_id = 3; }

message ReleaseExecuteResponse { string session_id = 1; string operation_id = 2; }

message AddArtifactsRequest {
  string session_id = 1;
  oneof artifact {
    ArtifactBatch batch = 3;
    BeginChunkedArtifact begin_chunk = 4;
    ArtifactChunk chunk = 5;
  }
  message ArtifactBatch { repeated SingleArtifact artifacts = 1; }
  message SingleArtifact { string name = 1; bytes data = 2; }
  message BeginChunkedArtifact { string name = 1; uint64 total_bytes = 2; }
  message ArtifactChunk { string name = 1; bytes data = 2; }
}

message AddArtifactsResponse {
  repeated ArtifactSummary artifacts = 1;
  message ArtifactSummary { string name = 1; bool success = 2; string message = 3; }
}

message ArtifactStatusesRequest { string session_id = 1; repeated string names = 4; }

message ArtifactStatusesResponse {
  message ArtifactStatus { bool exists = 1; }
  map<string, ArtifactStatus> statuses = 1;
}

message Schema { repeated Field fields = 1; }
message Field { string name = 1; string dtype = 2; }
message JsonRows { repeated string rows = 1; }
message ExecuteMetrics { uint64 elapsed_ms = 1; uint64 row_count = 2; }
message Error { string message = 1; }
